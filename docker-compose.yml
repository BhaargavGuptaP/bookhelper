# Local development services for BookHelper.
# Usage: `docker compose up -d` (requires Docker). The app reads these via .env.
services:
  postgres:
    image: postgres:16-alpine
    container_name: bookhelper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookhelper
      POSTGRES_PASSWORD: bookhelper
      POSTGRES_DB: bookhelper
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookhelper -d bookhelper"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for local dev (mirrors Cloudflare R2 / S3).
  minio:
    image: minio/minio:latest
    container_name: bookhelper-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
