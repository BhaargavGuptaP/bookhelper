# Git hooks (lefthook) — fast, parallel, language-agnostic.
# Installed via `pnpm install` (root `prepare` script runs `lefthook install`).

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,md,css,yml,yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: pnpm exec eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm run typecheck
    test:
      run: pnpm run test
